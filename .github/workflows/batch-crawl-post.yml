name: Batch - crawlPostJob

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  id-token: write
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  crawl-post:
    uses: ./.github/workflows/_batch-ssm-runner.yml
    with:
      job_name: crawlPostJob
    secrets:
      AWS_IAM_ROLE_FOR_OIDC: ${{ secrets.AWS_IAM_ROLE_FOR_OIDC }}
      EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
      RDS_ENDPOINT: ${{ secrets.RDS_ENDPOINT }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
