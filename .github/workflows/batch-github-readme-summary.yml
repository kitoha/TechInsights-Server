name: Batch - githubReadmeSummaryJob

on:
  workflow_dispatch:
    inputs:
      max_items_per_run:
        description: 1회 실행당 최대 처리 레포 수
        required: false
        type: string
        default: ''
  schedule:
    - cron: '0 1 * * *'

permissions:
  id-token: write
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  github-readme-summary:
    uses: ./.github/workflows/_batch-ssm-runner.yml
    with:
      job_name: githubReadmeSummaryJob
      extra_params: ${{ inputs.max_items_per_run != '' && format('maxItemsPerRun={0}', inputs.max_items_per_run) || (github.event_name == 'schedule' && 'maxItemsPerRun=525') || '' }}
    secrets:
      AWS_IAM_ROLE_FOR_OIDC: ${{ secrets.AWS_IAM_ROLE_FOR_OIDC }}
      EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
      RDS_ENDPOINT: ${{ secrets.RDS_ENDPOINT }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
