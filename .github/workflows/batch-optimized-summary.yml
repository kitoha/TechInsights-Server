name: Batch - optimizedSummaryJob

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 처리할 최대 포스트 수
        required: false
        type: string
        default: '1000'
  schedule:
    - cron: '0 7 * * *'

permissions:
  id-token: write
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  optimized-summary:
    uses: ./.github/workflows/_batch-ssm-runner.yml
    with:
      job_name: optimizedSummaryJob
      extra_params: limit=${{ github.event_name == 'schedule' && '49' || inputs.limit }}
    secrets:
      AWS_IAM_ROLE_FOR_OIDC: ${{ secrets.AWS_IAM_ROLE_FOR_OIDC }}
      EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
      RDS_ENDPOINT: ${{ secrets.RDS_ENDPOINT }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
