name: Batch - postVectorEmbeddingJob

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 처리할 최대 포스트 수
        required: false
        type: string
        default: '1000'
      embedding_batch_size:
        description: 임베딩 배치 크기
        required: false
        type: string
        default: '50'

jobs:
  post-embedding:
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/_batch-ssm-runner.yml
    with:
      job_name: postVectorEmbeddingJob
      extra_params: limit=${{ inputs.limit }} embeddingBatchSize=${{ inputs.embedding_batch_size }}
    secrets:
      AWS_IAM_ROLE_FOR_OIDC: ${{ secrets.AWS_IAM_ROLE_FOR_OIDC }}
      EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
      RDS_ENDPOINT: ${{ secrets.RDS_ENDPOINT }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
