on:
  workflow_call:
    inputs:
      job_name:
        required: true
        type: string
      extra_params:
        required: false
        type: string
        default: ''
    secrets:
      AWS_IAM_ROLE_FOR_OIDC:
        required: true
      EC2_INSTANCE_ID:
        required: true
      RDS_ENDPOINT:
        required: true
      SLACK_WEBHOOK_URL:
        required: true

env:
  AWS_REGION: ap-northeast-2
  SSM_PLUGIN_VERSION: 1.2.792.0
  SSM_PLUGIN_SHA256: 34e2e68254c77a182264232ed47985901e5f07f190c280400746a004276830c4

jobs:
  run-batch:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_FOR_OIDC }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install SSM Session Manager Plugin
        run: |
          curl -sO "https://s3.amazonaws.com/session-manager-downloads/plugin/${SSM_PLUGIN_VERSION}/ubuntu_64bit/session-manager-plugin.deb"
          echo "${SSM_PLUGIN_SHA256}  session-manager-plugin.deb" | sha256sum -c -
          sudo dpkg -i session-manager-plugin.deb

      - name: Open SSM tunnel to RDS
        timeout-minutes: 2
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          RDS_ENDPOINT: ${{ secrets.RDS_ENDPOINT }}
        run: |
          aws ssm start-session \
            --target "$EC2_INSTANCE_ID" \
            --document-name AWS-StartPortForwardingSessionToRemoteHost \
            --parameters "{\"host\":[\"$RDS_ENDPOINT\"],\"portNumber\":[\"5432\"],\"localPortNumber\":[\"5432\"]}" &
          echo "SSM_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 30); do
            if nc -z localhost 5432; then
              echo "Tunnel is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Tunnel failed to open"
          exit 1

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build batch JAR
        run: chmod +x gradlew && ./gradlew :batch:build -x test --no-daemon

      - name: Run batch job
        timeout-minutes: 110
        env:
          SPRING_PROFILES_ACTIVE: prod
          DB_URL: jdbc:postgresql://localhost:5432/techinsights_db
          AWS_REGION: ${{ env.AWS_REGION }}
          JOB_NAME: ${{ inputs.job_name }}
          EXTRA_PARAMS: ${{ inputs.extra_params }}
          RUN_ID: ${{ github.run_id }}
        run: |
          JAR_PATH=$(ls batch/build/libs/batch-*.jar | grep -v plain | head -1)
          JAVA_ARGS=(--spring.batch.job.name="$JOB_NAME")
          if [ -n "$EXTRA_PARAMS" ]; then
            read -ra EXTRA_ARGS <<< "$EXTRA_PARAMS"
            JAVA_ARGS+=("${EXTRA_ARGS[@]}")
          fi
          JAVA_ARGS+=("run.id=$RUN_ID")
          java -Xms128m -Xmx512m -XX:MaxMetaspaceSize=128m -XX:+UseSerialGC -XX:+ExitOnOutOfMemoryError \
            -jar "$JAR_PATH" \
            "${JAVA_ARGS[@]}"

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          JOB_NAME: ${{ inputs.job_name }}
          EXTRA_PARAMS: ${{ inputs.extra_params }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            ICON="✅"; COLOR="good"; LABEL="완료"
          else
            ICON="❌"; COLOR="danger"; LABEL="실패"
          fi
          jq --null-input \
            --arg text "${ICON} *${JOB_NAME}* ${LABEL}" \
            --arg params "${EXTRA_PARAMS:-없음}" \
            --arg url "$RUN_URL" \
            --arg color "$COLOR" \
            '{
              text: $text,
              attachments: [{
                color: $color,
                fields: [
                  {title: "Params", value: $params, short: false},
                  {title: "Log", value: $url, short: false}
                ]
              }]
            }' | curl -sS -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d @-

      - name: Close SSM tunnel
        if: always()
        run: |
          if [ -n "$SSM_PID" ]; then
            kill -- "$SSM_PID" 2>/dev/null || true
          fi
