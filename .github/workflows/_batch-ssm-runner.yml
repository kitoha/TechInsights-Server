on:
  workflow_call:
    inputs:
      job_name:
        required: true
        type: string
      extra_params:
        required: false
        type: string
        default: ''
    secrets:
      AWS_IAM_ROLE_FOR_OIDC:
        required: true
      EC2_INSTANCE_ID:
        required: true
      RDS_ENDPOINT:
        required: true
      SLACK_WEBHOOK_URL:
        required: true

env:
  AWS_REGION: ap-northeast-2

jobs:
  run-batch:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_FOR_OIDC }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install SSM Session Manager Plugin
        run: |
          curl -sO https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb
          sudo dpkg -i session-manager-plugin.deb

      - name: Open SSM tunnel to RDS
        run: |
          aws ssm start-session \
            --target ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name AWS-StartPortForwardingSessionToRemoteHost \
            --parameters '{"host":["${{ secrets.RDS_ENDPOINT }}"],"portNumber":["5432"],"localPortNumber":["5432"]}' &
          echo "SSM_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 15); do
            if nc -z localhost 5432; then
              echo "Tunnel is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Tunnel failed to open"
          exit 1

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build batch JAR
        run: chmod +x gradlew && ./gradlew :batch:build -x test --no-daemon

      - name: Run batch job
        env:
          SPRING_PROFILES_ACTIVE: prod
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/techinsights_db
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          EXTRA_PARAMS="${{ inputs.extra_params }}"
          java -Xms128m -Xmx512m -XX:MaxMetaspaceSize=128m -XX:+UseSerialGC -XX:+ExitOnOutOfMemoryError \
            -jar batch/build/libs/batch-0.0.1-SNAPSHOT.jar \
            --spring.batch.job.name=${{ inputs.job_name }} ${EXTRA_PARAMS} run.id=${{ github.run_id }}

      - name: Notify Slack success
        if: success()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-Type: application/json' \
            -d '{
              "text": "✅ *${{ inputs.job_name }}* 완료",
              "attachments": [
                {
                  "color": "good",
                  "fields": [
                    {
                      "title": "Params",
                      "value": "${{ inputs.extra_params != '' && inputs.extra_params || '없음' }}",
                      "short": false
                    },
                    {
                      "title": "Log",
                      "value": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                      "short": false
                    }
                  ]
                }
              ]
            }'

      - name: Notify Slack failure
        if: failure()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-Type: application/json' \
            -d '{
              "text": "❌ *${{ inputs.job_name }}* 실패",
              "attachments": [
                {
                  "color": "danger",
                  "fields": [
                    {
                      "title": "Params",
                      "value": "${{ inputs.extra_params != '' && inputs.extra_params || '없음' }}",
                      "short": false
                    },
                    {
                      "title": "Log",
                      "value": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                      "short": false
                    }
                  ]
                }
              ]
            }'

      - name: Close SSM tunnel
        if: always()
        run: kill $SSM_PID 2>/dev/null || true
