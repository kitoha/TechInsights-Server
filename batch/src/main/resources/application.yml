batch:
  post-crawling:
    job-name: crawlPostJob
    step-name: crawlPostStep
    chunk-size: 1
    retry-limit: 3
    core-pool-size: 6
    max-pool-size: 6
  processing:
    # Gemini API 5 RPM
    concurrency-limit: 1
    timeout-ms: 180000
  jitter:
    enabled: true
    min-ms: 100
    max-ms: 2000
  github-trending:
    job-name: githubTrendingJob
    step-name: githubTrendingStep
    chunk-size: 50
  github-readme-summary:
    job-name: githubReadmeSummaryJob
    step-name: githubReadmeSummarizeStep
    chunk-size: 75
    page-size: 100
    max-items-per-run: 3000
    retry-enabled: true
    retry-after-days: 7
  github-embedding:
    job-name: githubReadmeEmbeddingJob
    step-name: githubReadmeEmbeddingStep
    chunk-size: 10         # Writer 1회 API 호출(batchEmbedContents) 당 처리할 레포 수
    page-size: 100         # DB에서 한 번에 읽어올 레포 수
    max-items-per-run: 5000 # 1회 실행당 최대 처리 수 (chunk 500회 = API 500회, RPD 1,000 여유)

github:
  api:
    base-url: https://api.github.com
    token: ${GITHUB_TOKEN:}
    per-page: 100

web-client:
  connect-timeout-millis: 10000
  response-timeout-seconds: 15
  read-timeout-seconds: 15
  write-timeout-seconds: 15
  max-in-memory-size-mb: 5
  user-agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
  retry:
    max-attempts: 3
    backoff-seconds: 2

spring:
  flyway:
    enabled: false
  datasource:
    hikari:
      maximum-pool-size: 8
      minimum-idle: 3
      connection-timeout: 20000

content:
  selectors:
    techblog.woowahan.com:
      - ".post-content-inner > .post-content-body"

    tech.kakao.com:
      - ".inner_content > .daum-wm-content.preview"

    toss.tech:
      - "article.css-hvd0pt > div.css-1vn47db"

    d2.naver.com:
      - "article"
      - ".post-area"
      - ".section-content"
      - ".post-body"
      - ".content-area"

    helloworld.kurly.com:
      - ".post-content"
      - ".article-body"
      - ".post"

    medium.com:
      - "article"
      - ".meteredContent"
      - ".pw-post-body"
      - ".postArticle-content"

  default-selectors:
    - "article"
    - ".post-content"
    - ".entry-content"
    - "#content"
    - ".blog-post"


rate-limiter:
  gemini:
    limit-for-period: 8
    refresh-period-seconds: 60
    timeout-seconds: 30
  gemini-batch-rpm:
    limit-for-period: 5
    refresh-period-seconds: 60
    timeout-seconds: 60
  gemini-batch-rpd:
    limit-for-period: 20
    refresh-period-seconds: 86400
    timeout-seconds: 1
  gemini-embedding:
    limit-for-period: 90  # gemini-embedding-001 기본 90 RPM (무료 티어: 10 RPM으로 낮출 것)
    refresh-period-seconds: 60
    timeout-seconds: 30
  gemini-readme-rpm:
    limit-for-period: 2       # TPM 제약: 250K TPM ÷ 100K tokens/req = 2.5 → 2 RPM 안전
    refresh-period-seconds: 60
    timeout-seconds: 60
  gemini-readme-rpd:
    limit-for-period: 20      # 독립 API 키 사용 시 전체 일일 한도 사용 가능
    refresh-period-seconds: 86400
    timeout-seconds: 1
  github:
    limit-for-period: 8       # 인증 없음: Search API 10 req/min 안전마진. GITHUB_TOKEN 있으면 25로 변경
    refresh-period-seconds: 60
    timeout-seconds: 90
  crawler:
    ultra-safe:
      limit-for-period: 5
      refresh-period-seconds: 60
      timeout-seconds: 30
    conservative:
      limit-for-period: 10
      refresh-period-seconds: 60
      timeout-seconds: 30
    standard:
      limit-for-period: 15
      refresh-period-seconds: 60
      timeout-seconds: 30

circuit-breaker:
  gemini-batch:
    failure-rate-threshold: 50  # 실패율 50% 이상 시 오픈
    slow-call-rate-threshold: 80  # 느린 호출 80% 이상 시 오픈
    slow-call-duration-threshold-seconds: 180  # 30초 이상 걸리면 느린 호출로 간주
    wait-duration-in-open-state-seconds: 60  # OPEN 상태 60초 유지
    permitted-number-of-calls-in-half-open-state: 3  # HALF_OPEN 시 3개 호출 허용
    sliding-window-size: 10  # 최근 10개 호출 기준
    minimum-number-of-calls: 5  # 최소 5개 호출 후 통계 계산

gemini:
  api-key: ${GEMINI_API_KEY}
  max-output-tokens: 65536          # 단건 아티클 요약 (GeminiArticleSummarizer)
  # README 배치 동적 토큰 계산 설정
  max-tokens-per-request: 100000    # 배치 요청당 총 토큰 예산 (TPM 250K ÷ 2 RPM = 125K, 안전 마진 100K)
  input-tokens-per-item: 500        # 항목당 입력 토큰 추정 (README 2000자 ≈ 500 토큰)
  output-tokens-per-item: 300       # 항목당 출력 목표 (한국어 요약 2문장 + JSON, 200→300 여유 마진)
